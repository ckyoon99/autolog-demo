<script>
const staticUri = '/siw/etc/login/view.do';

//url 체크
var urlCheck = function(_url) {
    const regex = /\/?((\/[^\s\/]+)*)?\/(view|data|contents)(\-popup)?\.do(\?([^#\s]*))*/gi;
    return regex.test(_url);
}

//XSS Filter 체크
var XSScheck = function(str) {
    str = str.replace(/\<|\>|\"|\'|\;|\(|\)|cookie|alert\(|onmouse/g,"");
    return str;
};

document.addEventListener('DOMContentLoaded', function (){
    var responseUri = '';
    var baseUri = '/siw/main/front/view.do';
    
    if(typeof(Storage) !== "undefined") {   //localStorage 방식
        if(localStorage.uri) {
            responseUri = localStorage.getItem("uri");
            responseUri =  ((responseUri == null || responseUri == '') ? baseUri : atob(responseUri));
            localStorage.removeItem("uri");
        } else {
            responseUri = baseUri;
        }
    } else {    //get 방식
        var subUri = location.search;
        responseUri =  ((subUri == null || subUri == '' || subUri == '?' )? baseUri : atob(subUri.slice(subUri.indexOf('?')+1, subUri.length)));
    }
    
    document.getElementById("mainFrame").src=(urlCheck(responseUri))?XSScheck(responseUri) : baseUri;
});
</script>
