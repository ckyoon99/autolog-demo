server.port=8081
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# JSP 수정 시 재시작 없이 반영 (개발용)
server.servlet.jsp.init-parameters.development=true
server.servlet.jsp.init-parameters.checkInterval=0
server.servlet.jsp.init-parameters.modificationTestInterval=0

logging.level.com.autolog=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Oracle DB — MyAssets01.jsp 등 쿼리 샘플 호출 시 사용 (데모 사이트는 _MyAssets01.jsp 사용)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:ORCL
spring.datasource.username=autolog
spring.datasource.password=autolog
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
